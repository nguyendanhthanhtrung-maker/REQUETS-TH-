<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Appeal - Render Mode</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #ececec; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1877f2; text-align: center; margin-top: 0; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; resize: vertical; margin-bottom: 15px; }
        button { width: 100%; background: #1877f2; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #145dbf; }
        .info { font-size: 12px; color: #777; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Facebook Appeal</h2>
        <p style="font-size: 14px; text-align: center;">Mã xác thực đã được lấy từ hệ thống Render.</p>
        
        <label style="font-weight: bold; font-size: 13px;">Danh sách ID hoặc Link:</label>
        <textarea id="ids" rows="8" placeholder="Dán danh sách ID vào đây..."></textarea>
        
        <button onclick="start()">BẮT ĐẦU CHẠY</button>
        
        <div class="info">
            * Lưu ý: Hệ thống sẽ chạy ngầm. Bạn có thể xem kết quả chi tiết trong phần <b>Logs</b> của Render Dashboard.
        </div>
    </div>

    <script>
        async function start() {
            const ids = document.getElementById('ids').value;
            if(!ids) return alert("Vui lòng nhập ID!");

            try {
                await fetch('/api/run', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ids: ids })
                });
                alert("Lệnh đã được gửi! Quá trình kháng nghị đang chạy ngầm.");
            } catch (e) {
                alert("Lỗi kết nối!");
            }
        }
    </script>
</body>
</html>
