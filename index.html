<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Appeal Tool</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1877f2; text-align: center; }
        textarea { width: 100%; height: 150px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; }
        button { width: 100%; background: #1877f2; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .note { font-size: 12px; color: #65676b; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Facebook Appeal Bot</h2>
        <textarea id="listIds" placeholder="Dán danh sách ID/Link vào đây..."></textarea>
        <button onclick="process()">BẮT ĐẦU CHẠY</button>
        <div class="note">Địa chỉ Health Check: <b>/health</b></div>
    </div>
    <script>
        async function process() {
            const ids = document.getElementById('listIds').value;
            if (!ids.trim()) return alert("Nhập ID đã!");
            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ids: ids })
                });
                const data = await response.json();
                alert(data.message || data.error);
            } catch (e) { alert("Lỗi kết nối server!"); }
        }
    </script>
</body>
</html>
